<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Wishes</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0077ff, #6dd5ff, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .birthday-card {
      width: 100%;
      max-width: 750px;
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 50px 35px;
      text-align: center;
      color: #ffffff;
      box-shadow: 0 20px 50px rgba(0, 70, 160, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.4);
      position: relative;
      z-index: 2;
    }

    .birthday-card h1 {
      font-size: 56px;
      margin-bottom: 15px;
      color: #ffffff;
      text-shadow: 0 5px 15px rgba(0, 80, 180, 0.35);
    }

    .birthday-card h2 {
      font-size: 30px;
      margin-bottom: 20px;
      color: #eaf8ff;
      font-weight: 500;
    }

    .birthday-card p {
      font-size: 18px;
      line-height: 1.7;
      max-width: 620px;
      margin: 0 auto 30px;
      color: #f8fcff;
    }

    .cake {
      font-size: 70px;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #ffffff;
      color: #0077ff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(0, 80, 180, 0.25);
      transition: 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-4px);
      background: #eaf8ff;
    }

    .balloon {
      position: absolute;
      width: 55px;
      height: 70px;
      background: rgba(255, 255, 255, 0.65);
      border-radius: 50%;
      animation: float 6s infinite ease-in-out;
    }

    .balloon::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 60px;
      background: rgba(255, 255, 255, 0.7);
      left: 50%;
      top: 70px;
      transform: translateX(-50%);
    }

    .balloon.one {
      left: 8%;
      bottom: 10%;
      animation-delay: 0s;
    }

    .balloon.two {
      right: 10%;
      bottom: 20%;
      width: 65px;
      height: 85px;
      background: rgba(173, 232, 255, 0.8);
      animation-delay: 1.5s;
    }

    .balloon.three {
      left: 18%;
      top: 12%;
      width: 45px;
      height: 60px;
      background: rgba(255, 255, 255, 0.5);
      animation-delay: 3s;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      animation: pulse 5s infinite ease-in-out;
    }

    .circle.one {
      width: 180px;
      height: 180px;
      top: -60px;
      right: -50px;
    }

    .circle.two {
      width: 250px;
      height: 250px;
      bottom: -100px;
      left: -90px;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-35px);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.4;
      }
      50% {
        transform: scale(1.15);
        opacity: 0.8;
      }
    }

    @media (max-width: 768px) {
      .birthday-card {
        padding: 40px 25px;
      }

      .birthday-card h1 {
        font-size: 42px;
      }

      .birthday-card h2 {
        font-size: 24px;
      }

      .birthday-card p {
        font-size: 16px;
      }

      .cake {
        font-size: 58px;
      }
    }

    @media (max-width: 480px) {
      .birthday-card {
        padding: 35px 20px;
        border-radius: 22px;
      }

      .birthday-card h1 {
        font-size: 34px;
      }

      .birthday-card h2 {
        font-size: 21px;
      }

      .btn {
        padding: 12px 26px;
        font-size: 15px;
      }

      .balloon {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="circle one"></div>
  <div class="circle two"></div>

  <div class="balloon one"></div>
  <div class="balloon two"></div>
  <div class="balloon three"></div>

  <div class="birthday-card">
    <div class="cake">🎂</div>

    <h1>Happy Birthday!</h1>
    <h2>Wishing You a Day Full of Joy</h2>

    <p>
      May your birthday be filled with bright smiles, beautiful moments,
      endless happiness, and all the love your heart can hold.
      Wishing you success, health, peace, and countless reasons to celebrate.
    </p>

    <a href="#" class="btn">Celebrate Today 🎉</a>
  </div>

</body>
</html>
